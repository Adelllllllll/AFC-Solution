version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURATION COMMUNE AIRFLOW
# ─────────────────────────────────────────────────────────────────────────────
x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.2}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    PYTHONPATH: /opt/airflow
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas boto3 sqlalchemy psycopg2-binary" #
    POSTGRES_USER: airflow
    POSTGRES_PASSWORD: airflow
    POSTGRES_DB: airflow
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    LOCALSTACK_URL: http://localstack:4566
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_DEFAULT_REGION: us-east-1
    CLEAN_FILE_PATH: /opt/airflow/data/processed/cleaned_sales_data.csv
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  networks:
    - afc_network #

# ─────────────────────────────────────────────────────────────────────────────
# SERVICES
# ─────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:13
    container_name: ndai_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    networks:
      - afc_network

  localstack:
    image: localstack/localstack
    container_name: ndai_localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=s3
      - DEBUG=1
    volumes:
      - "./localstack_data:/var/lib/localstack"
    networks:
      - afc_network

  fastapi:
    image: python:3.10-slim
    container_name: ndai_fastapi
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    working_dir: /app
    command: bash -c "pip install -r requirements.txt && uvicorn src.api_feedback:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s 
      timeout: 5s
      retries: 15 
      start_period: 60s 
    networks:
      - afc_network

  airflow-webserver:
    <<: *airflow-common
    container_name: afc-solution-airflow-webserver-1
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 10 
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: afc-solution-airflow-scheduler-1
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: afc-solution-airflow-init-1
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build: .
    container_name: ndai_streamlit
    profiles: ["ui"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard.py:/app/dashboard.py
      - ./data:/app/data
      - ./src:/app/src
    depends_on:
      airflow-webserver:
        condition: service_healthy
    networks:
      - afc_network

# ─────────────────────────────────────────────────────────────────────────────
# RÉSEAUX & VOLUMES NOMMÉS
# ─────────────────────────────────────────────────────────────────────────────
networks:
  afc_network:
    driver: bridge

volumes:
  hf_cache: