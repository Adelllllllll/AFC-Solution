version: '3.8'

x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.2}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Add src folder to Python path for imports
    PYTHONPATH: /opt/airflow
    
    # --- NOUVEAU : Ajout de fastapi, uvicorn et pydantic pour qu'Airflow puisse lire nos fichiers src/ sans crasher ---
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas boto3 sqlalchemy psycopg2-binary fastapi uvicorn pydantic"
    
    # Configuration for pipeline scripts
    # PostgreSQL connection settings
    POSTGRES_USER: airflow
    POSTGRES_PASSWORD: airflow
    POSTGRES_DB: airflow
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    # LocalStack (S3 simulation) settings
    LOCALSTACK_URL: http://localstack:4566
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_DEFAULT_REGION: us-east-1
    # File paths (relative to container)
    CLEAN_FILE_PATH: /opt/airflow/data/processed/cleaned_sales_data.csv

  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs

services:
  # PostgreSQL: stores Airflow metadata and sales data
  postgres:
    image: postgres:13
    container_name: ndai_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # LocalStack: simulates AWS S3
  localstack:
    image: localstack/localstack
    container_name: ndai_localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=s3
      - DEBUG=1
    volumes:
      - "./localstack_data:/var/lib/localstack"

  # --- NOUVEAU : Le bloc FastAPI pour la Pipeline B ---
  fastapi:
    image: python:3.10-slim
    container_name: ndai_fastapi
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    working_dir: /app
    command: bash -c "pip install -r requirements.txt && uvicorn src.api_feedback:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # Airflow Webserver: web UI for monitoring
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # Airflow Scheduler: orchestrates task execution
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # Airflow Init: initializes database and creates default user
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    depends_on:
      postgres:
        condition: service_healthy